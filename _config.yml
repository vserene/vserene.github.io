  - title: Experience
    layout: list
    content:
      - layout: left
        title: ACS TECHNOLOGIES GROUP INC
        sub_title: SOFTWARE ENGINEER - FULL STACK
        caption: May 2022-Dec 2025 | Remote
        description: | 
          - Engineered comprehensive full-stack financial modules, including Accounts Payable, Accrual Accounting, Payroll, and Tax Reporting, directly improving end-user financial accuracy
          - More than 20% increased in creation of sites using Realm Accounting year to year
          - Deployed features such as ACH checking integrations, accrual accounting, and attachments management within an Agile/Scrum framework
          - Modified and designed SQL database tables in SQL and CRUD (create, read, update, and delete) data for application usages
          - Developed and managed C# microservices, implementing custom controllers and services to enhance system modularity and reliability
          - Transformed Figma designs into responsive UI components using Vue.js and JavaScript while refactoring legacy jQuery code for better maintainability
          - Leveraged Claude AI as a force-multiplier for code debugging and initial template, reducing development turnaround time
          - Updated and maintained Tax Calculator feature through Symmetry Software API in Golang

      - layout: left
        title: FAST ENTERPRISES, LLC
        sub_title: IMPLEMENTATION CONSULTANT
        caption: May 2021-May 2022 | Harrisburg, PA
        description: |
