  - title: Experience
    layout: list
    content:
      - layout: left
        title: ACS TECHNOLOGIES GROUP INC
        sub_title: SOFTWARE ENGINEER - FULL STACK
        caption: May 2022-Dec 2025 | Remote
        description: | 
          - Architected, implemented, and maintained full-stack financial modules such as Accounts Payable, Accrual Accounting, Payroll, and Tax Reporting, which resulted in increased creation of sites using Realm Accounting by 20% year to year
          - Designed and implemented key features such as ACH integrations, Accounting Oversight, and Attachments Management by building C# microservices and custom controllers while constructing and optimizing SQL (T-SQL) databases utilizing Execution Plans and Datadog
          - Transformed Figma designs into responsive user interface (UI) components using Vue.js and JavaScript while refactoring legacy jQuery code in over 25 pages
          - Maintained Tax Calculator feature to comply with state and local laws through Symmetry Software API in Golang available for more than 50,000 customers
          - Leveraged Claude AI as a force-multiplier for code debugging and initial templates by setting up multiple agentic windows to pull from designated files, accelerating standard development workflows by 25%

      - layout: left
        title: FAST ENTERPRISES, LLC
        sub_title: IMPLEMENTATION CONSULTANT
        caption: May 2021-May 2022 | Harrisburg, PA
        description: |
          - Consulted with Pennsylvania state officials to scope and automate registration workflows via the proprietary GenTax solution, delivering a centralized system utilized by every single new business in the state
