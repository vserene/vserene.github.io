about_content: | # this will include new lines to allow paragraphs
  With over 5 years of experience in software development, I specialize in full-stack development with a focus on finance-related functionalities such as accounts payable, payroll, 
  and accrual accounting. At ACS Technologies, I was dedicated to delivering solutions that allowed organizations to streamline their financial processes. <br><br>



